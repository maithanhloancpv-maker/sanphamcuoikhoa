<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập Minecraft Style</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #1b1b1b url("https://i.imgur.com/8QfT9gH.png") repeat;
        color: white;
        display: flex;
        justify-content: center;
        padding-top: 80px;
    }

    .container {
        background: #3c3c3c;
        padding: 30px;
        width: 350px;
        border: 4px solid #000;
        box-shadow: 0 0 20px #000;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 2px 2px #000;
        font-size: 22px;
        text-transform: uppercase;
    }

    input, button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 2px solid #000;
        outline: none;
        background: #555;
        color: white;
        font-size: 15px;
    }

    input:focus {
        background: #666;
    }

    button {
        background: #4CAF50;
        font-weight: bold;
        cursor: pointer;
        border: 3px solid #000;
        transition: 0.15s;
    }

    button:hover {
        background: #3ea145;
        box-shadow: 0 4px 0 #000;
        transform: translateY(-2px);
    }

    button:active {
        background: #2e7c33;
        transform: translateY(0);
        box-shadow: none;
    }

    #message {
        margin-top: 12px;
        text-align: center;
        font-weight: bold;
    }

    .link {
        text-align: center;
        margin-top: 10px;
    }

    .link a {
        color: #39ff65;
        text-decoration: none;
        font-weight: bold;
    }

    .link a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Sign in</h2>

    <form id="loginForm">
        <label>Email:</label>
        <input type="email" id="email" required>

        <label>password:</label>
        <input type="password" id="password" required>

        <button type="submit">Sign in</button>
    </form>

    <p id="message"></p>

    <div class="link">
        New to Mindx Cenema?  
        <a href="MIndx Cenema.html">Sign up now</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(email === "" || pass === ""){
        showMessage("❌ Vui lòng nhập đầy đủ thông tin!", "red");
        return;
    }

    // DEMO (không kết nối server)
    showMessage("✔ Đăng nhập thành công!", "#4CAF50");
});

function showMessage(text, color){
    let msg = document.getElementById("message");
    msg.innerText = text;
    msg.style.color = color;
}
</script>

</body>
</html>
